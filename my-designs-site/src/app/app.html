@if (!motionService.reducedMotion()) {
  <div class="parallax-bg" aria-hidden="true">
    <div class="parallax-orb parallax-orb--1"></div>
    <div class="parallax-orb parallax-orb--2"></div>
    <div class="parallax-orb parallax-orb--3"></div>
  </div>
}

<app-navigation-bar [navLinks]="navLinks"></app-navigation-bar>

<main>
  @for (section of sections; track section.id) {
    @if (section.enabled) {
      <app-cross-section [component]="section.component" [glass]="section.glass" />
    }
  }
</main>
