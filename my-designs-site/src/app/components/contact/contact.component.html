<section id="contact" aria-labelledby="contact-heading">
  <div class="section-inner contact-inner">
    <p class="type-eyebrow">Contact<span class="brand-underscore">_</span></p>
    <h2 id="contact-heading" class="type-display contact-heading">Let's build something.</h2>

    <nav class="contact-links" aria-label="Contact links">
      <a href="mailto:eli.philpott@gmail.com" class="contact-link">
        <svg lucideMail [size]="20"></svg>
        <span>eli.philpott@gmail.com</span>
      </a>
      <a
        href="https://www.linkedin.com/in/eli-philpott/"
        class="contact-link"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span>LinkedIn</span>
        <svg lucideArrowUpRight [size]="16"></svg>
      </a>
      <a
        href="https://github.com/ClearTonic21"
        class="contact-link"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span>GitHub</span>
        <svg lucideArrowUpRight [size]="16"></svg>
      </a>
    </nav>

    <a
      href="assets/images/resume.pdf"
      class="button-primary"
      target="_blank"
      rel="noopener noreferrer"
    >
      View Resume
    </a>

    <footer class="contact-footer">
      <p class="type-caption">
        © 2026 Eli Philpott · ClearTonic Games<span class="brand-underscore">_</span>
      </p>
    </footer>
  </div>
</section>
