<section id="hero" class="hero-section">
  <div class="section-inner hero-inner">
    <p class="type-eyebrow">/ Intro · Worthington, OH</p>
    <h1 class="type-display hero-title">ELI<br />PHILPOTT</h1>
    <p class="type-body hero-copy">
      Software Designer and indie game creator building polished digital products, thoughtful
      interfaces, and playful interactive experiences.
    </p>
    <p class="type-heading hero-subtitle">UI/UX &amp; Software Designer</p>

    <div class="hero-actions">
      <button type="button" class="button-primary" (click)="viewWork()">View My Work</button>
      <a class="button-ghost" [href]="resumeHref" target="_blank" rel="noopener noreferrer">
        Resume ↗
      </a>
    </div>
  </div>

  <div class="hero-badge">
    <span class="type-eyebrow">ClearTonic Games</span><span class="brand-underscore">_</span>
  </div>
  <div class="hero-overlay" aria-hidden="true"></div>
</section>
