<section
  id="hero"
  class="hero-section"
  [@heroEntrance]
  [@.disabled]="motionService.reducedMotion()"
>
  <div class="section-inner hero-inner">
    <h1 class="type-display hero-title hero-animate">
      ELI<span> </span><br />PHILPOTT<span class="brand-underscore">_</span>
    </h1>
    <p class="type-heading hero-subtitle hero-animate">UI/UX &amp; Software Designer</p>
    <p class="type-body hero-copy hero-animate">
      Software Designer and indie game creator building polished digital products, thoughtful
      interfaces, and playful interactive experiences.
    </p>

    <!-- Resume CTA — centered below the subtitle -->
    <div class="hero-resume hero-animate">
      <a class="button-ghost" [href]="resumeHref" target="_blank" rel="noopener noreferrer">
        View Resume <span class="link-arrow" aria-hidden="true">↗</span>
      </a>
    </div>
  </div>

  <!-- Scroll cue — bottom-left, always above the nav overlay -->
  <div
    class="hero-scroll-cue"
    role="button"
    tabindex="0"
    aria-label="Scroll to About section"
    (click)="viewWork()"
    (keydown.enter)="viewWork()"
    (keydown.space)="viewWork()"
  >
    <span class="scroll-cue-label">View my work</span>
    <svg
      lucideChevronDown
      [size]="16"
      class="scroll-cue-chevron"
      [class.is-animated]="!motionService.reducedMotion()"
      aria-hidden="true"
    ></svg>
  </div>

  <div class="hero-overlay" aria-hidden="true"></div>
</section>
