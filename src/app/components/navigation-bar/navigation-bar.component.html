<nav
  class="nav-bar"
  [class.is-hidden]="isNavHidden()"
  [class.is-collapsed]="isNavCollapsed()"
  [class.is-menu-open]="isMenuOpen()"
  aria-label="Site navigation"
>
  <div class="nav-space-column"></div>
  <div class="nav-main">
    <div class="nav-header" (click)="toggleMenu()">
      <div
        class="nav-monogram"
        aria-label="Scroll to top"
        (click)="$event.stopPropagation(); navLinkClick('hero')"
      >
        <img src="assets/icons/ClearTonic_%20icon.svg" alt="" aria-hidden="true" />
      </div>

      <!-- Hamburger lives here so it participates in the header row on mobile.
           display: none on desktop via media query. -->
      <button
        class="nav-hamburger"
        aria-label="Toggle menu"
        [attr.aria-expanded]="isMenuOpen()"
        (click)="$event.stopPropagation(); toggleMenu()"
      >
        @if (isMenuOpen()) {
          <svg lucideX [size]="24" aria-hidden="true"></svg>
        } @else {
          <span></span>
          <span></span>
          <span></span>
        }
      </button>
    </div>

    <div class="nav-body" [class.is-open]="isMenuOpen()">
      @for (link of navLinks(); track link.id) {
        <app-text-link
          [label]="link.label"
          [icon]="'underscore'"
          (activated)="navLinkClick(link.id)"
        />
      }
    </div>

    <div class="nav-footer">
      <app-icon-button
        icon="theme"
        [active]="isLightMode()"
        [label]="isLightMode() ? 'Switch to dark mode' : 'Switch to light mode'"
        [tooltip]="isLightMode() ? 'Light mode: enabled' : 'Dark mode: enabled'"
        (activated)="toggleLightMode()"
      />
      <app-icon-button
        icon="contrast"
        [active]="isHighContrast()"
        [label]="isHighContrast() ? 'Disable high contrast' : 'Enable high contrast'"
        [tooltip]="isHighContrast() ? 'High contrast: enabled' : 'High contrast: disabled'"
        (activated)="toggleHighContrast()"
      />
      <app-icon-button
        icon="motion"
        [active]="motionService.reducedMotion()"
        [label]="motionService.reducedMotion() ? 'Enable motion' : 'Reduce motion'"
        [tooltip]="
          motionService.reducedMotion() ? 'Reduce motion: enabled' : 'Reduce motion: disabled'
        "
        (activated)="motionService.toggleReducedMotion()"
      />
    </div>
  </div>

  <div class="nav-chevron-column" (click)="toggleNavCollapse()">
    <button
      class="nav-collapse-toggle"
      [attr.aria-label]="isNavCollapsed() ? 'Expand navigation' : 'Collapse navigation'"
      (click)="$event.stopPropagation(); toggleNavCollapse()"
    >
      @if (isNavCollapsed()) {
        <svg lucideChevronRight [size]="16" aria-hidden="true"></svg>
      } @else {
        <svg lucideChevronLeft [size]="16" aria-hidden="true"></svg>
      }
    </button>
  </div>
</nav>

<!-- Tap outside to close — transparent so the page stays readable behind the dropdown -->
@if (isMenuOpen()) {
  <div class="nav-backdrop" (click)="closeMenu()" role="presentation"></div>
}
