<section id="contact" aria-labelledby="contact-heading">
  <div class="section-inner contact-inner">
    <p class="type-eyebrow">Contact<span class="accent">_</span></p>
    <h2 id="contact-heading" class="type-display contact-heading" tabindex="0">
      Let's <span class="build-highlight">build</span> something.
    </h2>

    <nav class="contact-links" aria-label="Contact links">
      <app-text-link
        label="GitHub"
        icon="arrow"
        href="https://github.com/ClearTonic21"
        target="_blank"
      />
      <app-text-link
        label="LinkedIn"
        icon="arrow"
        href="https://www.linkedin.com/in/eli-philpott/"
        target="_blank"
      />
      <app-text-link
        label="eli.philpott21@gmail.com"
        icon="mail"
        [iconSize]="20"
        href="mailto:eli.philpott21@gmail.com"
      />
    </nav>

    <app-action-call
      text="Grab my Resume"
      [arrowIcon]="true"
      href="Eli_Philpott_Resume.pdf"
      target="_blank"
    />

    <footer class="contact-footer">
      <p class="type-caption">
        2026 · Eli Philpott · ClearTonic Games<span class="accent">_</span>
      </p>
    </footer>
  </div>
</section>
