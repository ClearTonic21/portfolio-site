<section id="projects" aria-labelledby="projects-heading">
  <div class="section-inner">
    <p class="type-eyebrow" appReveal>Projects<span class="brand-underscore">_</span></p>
    <h2 id="projects-heading" class="type-heading projects-heading" appReveal>Things I've Built</h2>

    <div class="projects-grid">
      @for (project of projects; track project.id) {
        <app-article-card
          [imagePath]="project.imagePath"
          [imageAlt]="project.imageAlt"
          [fullPage]="project.fullPage"
          [highlight]="project.eyebrow"
          [title]="project.title"
          appReveal
        >
          <app-tag-list [tags]="project.tags" />

          <p class="type-body project-description">{{ project.description }}</p>

          <a
            class="project-link"
            [href]="project.linkHref"
            [attr.target]="project.linkHref !== '#' ? '_blank' : null"
            [attr.rel]="project.linkHref !== '#' ? 'noopener noreferrer' : null"
          >
            {{ project.linkLabel }}
            <svg lucideArrowUpRight size="16" aria-hidden="true"></svg>
          </a>
        </app-article-card>
      }
    </div>
  </div>
</section>
