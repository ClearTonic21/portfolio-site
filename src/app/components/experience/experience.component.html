<div class="timeline">
  @for (entry of timelineEntries; track entry.id; let isEven = $even) {
    <div class="timeline-entry" [class.is-left]="isEven">
      <app-article-card
        [highlight]="entry.period"
        [title]="entry.company"
        [caption]="entry.role"
        appReveal
      >
        <ul class="timeline-bullets">
          @for (bullet of entry.bullets; track bullet) {
            <li class="type-body timeline-bullet">{{ bullet }}</li>
          }
        </ul>
        <app-tag-list [tags]="entry.tags" />
      </app-article-card>
    </div>
  }
</div>
