<section
  id="hero"
  class="hero-section"
  [@heroEntrance]
  [@.disabled]="motionService.reducedMotion()"
>
  <div class="section-inner hero-inner">
    <h1 class="type-display hero-title hero-animate">
      ELI<span> </span><br />PHILPOTT<span class="accent">_</span>
    </h1>
    <div class="type-heading hero-subtitle hero-animate">Software Designer &amp; Developer</div>
    <!-- <div class="type-body hero-copy hero-animate">
      Software Designer and indie game creator building polished digital products, thoughtful
      interfaces, and playful interactive experiences.
    </div> -->

    <div class="hero-resume hero-animate">
      <app-action-call
        text="Grab my Resume"
        [arrowIcon]="true"
        href="Eli_Philpott_Resume.pdf"
        target="_blank"
      />
    </div>
  </div>

  <div class="hero-overlay" aria-hidden="true"></div>
</section>
