<section
  id="hero"
  class="hero-section"
  [@heroEntrance]
  [@.disabled]="motionService.reducedMotion()"
>
  <div class="section-inner hero-inner">
    <div class="hero-headline">
      <h1 class="type-display hero-title hero-animate">
        ELI<span> </span><br />PHILPOTT<span class="accent">_</span>
      </h1>
      <h2 class="type-subtitle hero-subtitle hero-animate">Software Designer &amp; Developer</h2>
    </div>

    <div class="hero-resume hero-animate">
      <app-action-call
        text="Grab my Resume"
        [arrowIcon]="true"
        href="Eli_Philpott_Resume.pdf"
        target="_blank"
      />
    </div>
  </div>

  <div class="hero-overlay" aria-hidden="true"></div>
</section>
