<a
  class="action-call"
  [href]="href()"
  [attr.target]="target()"
  [attr.rel]="target() === '_blank' ? 'noopener noreferrer' : null"
  [attr.tabindex]="tabIndex()"
>
  <span class="action-call__label"
    >{{ text() }}
    @if (brandUnderscore()) {
      <span class="accent" aria-hidden="true">_</span>
    }
  </span>
  @if (arrowIcon()) {
    <span
      class="action-call__icon"
      [attr.role]="iconAriaLabel() ? 'img' : null"
      [attr.aria-label]="iconAriaLabel()"
      [attr.aria-hidden]="iconAriaLabel() ? null : 'true'"
    >
      <svg lucideArrowUpRight [size]="16" aria-hidden="true"></svg>
    </span>
  }
</a>
