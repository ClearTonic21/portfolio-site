@if (!motionService.reducedMotion()) {
  <div class="parallax-bg" aria-hidden="true">
    <div class="parallax-orb parallax-orb--1"></div>
    <div class="parallax-orb parallax-orb--2"></div>
    <div class="parallax-orb parallax-orb--3"></div>
  </div>
}

<!-- Light-mode gold background. With motion, three static gold-wave patches hover over the
     gold orbs, each with a transparency window gliding across. With reduced motion, a single
     flat field of gold waves stands in for the moving layers. -->
@if (themeService.isLight()) {
  @if (motionService.reducedMotion()) {
    <div class="gold-grid" aria-hidden="true"></div>
  } @else {
    <div class="gold-patches" aria-hidden="true">
      <div class="gold-patch gold-patch--1"></div>
      <div class="gold-patch gold-patch--2"></div>
      <div class="gold-patch gold-patch--3"></div>
      <div class="gold-patch gold-patch--4"></div>
    </div>
  }
}

<app-navigation-bar [navLinks]="navLinks"></app-navigation-bar>

<main>
  @for (section of sections; track section.id) {
    @if (section.enabled) {
      <app-cross-section [component]="section.component" [glass]="section.glass" />
    }
  }
</main>
